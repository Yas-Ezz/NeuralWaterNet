version: '3.8'

services:
  # Service 1: The AI Application (Data Generator & FastAPI)
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: neural_waternet_app
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - mosquitto
      - redis
    networks:
      - swe_network

  # Service 2: The Database (TimescaleDB)
  db:
    image: timescale/timescaledb:latest-pg14
    container_name: neural_waternet_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: waternet_db
    ports:
      - "5438:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - swe_network

  # Service 3: The Dashboard (Grafana)
  grafana:
    image: grafana/grafana-oss:latest
    container_name: neural_waternet_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin  # Default password
    depends_on:
      - db
    networks:
      - swe_network
    volumes:  # <--- THIS IS THE MAGIC BRIDGE
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards

  # Service 4: Message Broker (MQTT) - NEW!
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: neural_waternet_mqtt
    ports:
      - "1883:1883" # Standard MQTT port
      - "9001:9001" # WebSockets over MQTT
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - swe_network

  # Service 5: Caching & Sessions (Redis) - NEW!
  redis:
    image: redis:alpine
    container_name: neural_waternet_redis
    ports:
      - "6379:6379"
    networks:
      - swe_network

networks:
  swe_network:
    driver: bridge